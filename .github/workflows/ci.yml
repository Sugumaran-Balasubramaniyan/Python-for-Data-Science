name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: pip install jupyter nbconvert pytest nbformat pandas numpy matplotlib seaborn scikit-learn
      - name: Validate notebooks
        run: |
          for nb in *.ipynb; do
            [ -f "$nb" ] && python -m nbconvert --to notebook --execute --stdout "$nb" > /dev/null && echo "OK: $nb" || echo "FAIL: $nb"
          done

